# Smart Toilet BLE Services

send_command:
  name: Send BLE Command
  description: Send a command to the smart toilet via BLE.
  fields:
    command:
      name: Command
      description: The command to execute on the toilet.
      example: "light_on"
      required: true
      selector:
        select:
          mode: dropdown
          options:
            - label: "💡 Light On"
              value: "light_on"
            - label: "💡 Light Off"
              value: "light_off"
            - label: "🔌 Power On"
              value: "power_on"
            - label: "🔌 Power Off"
              value: "power_off"
            - label: "🍃 ECO Mode On"
              value: "eco_on"
            - label: "🍃 ECO Mode Off"
              value: "eco_off"
            - label: "🫧 Foam Shield On"
              value: "foam_on"
            - label: "🫧 Foam Shield Off"
              value: "foam_off"
            - label: "🔄 Auto Mode On"
              value: "auto_on"
            - label: "🔄 Auto Mode Off"
              value: "auto_off"
            - label: "🧹 Self Clean"
              value: "self_clean"
            - label: "🛑 Stop All"
              value: "stop"
            - label: "🌊 Flush"
              value: "flush"
            - label: "🚿 Women's Wash"
              value: "women_wash"
            - label: "💧 Butt Wash"
              value: "butt_wash"
            - label: "👶 Child Wash"
              value: "child_wash"
            - label: "💆 Massage"
              value: "massage"
            - label: "🚽 Cover Open"
              value: "cover_open"
            - label: "🚽 Cover Close"
              value: "cover_close"
            - label: "⭕ Ring Open"
              value: "ring_open"
            - label: "⭕ Ring Close"
              value: "ring_close"
            - label: "💨 Blow Dry On"
              value: "dry_on"
            - label: "💨 Blow Dry Off"
              value: "dry_off"
            - label: "🔄 Auto Flush On"
              value: "auto_flush_on"
            - label: "🔄 Auto Flush Off"
              value: "auto_flush_off"
            - label: "🫧 Auto Foam On"
              value: "auto_foam_on"
            - label: "🫧 Auto Foam Off"
              value: "auto_foam_off"
            - label: "🌙 Auto Night Light On"
              value: "auto_night_light_on"
            - label: "🌙 Auto Night Light Off"
              value: "auto_night_light_off"
            - label: "⚙️ Aging Mode On"
              value: "aging_mode_on"
            - label: "⚙️ Aging Mode Off"
              value: "aging_mode_off"
            - label: "💺 Virtual Seat On"
              value: "virtual_seat_on"
            - label: "💺 Virtual Seat Off"
              value: "virtual_seat_off"

set_temperature:
  name: Set Temperature
  description: Set the temperature level for seat, water, or air dryer.
  fields:
    type:
      name: Type
      description: The temperature zone to control.
      example: "seat"
      required: true
      selector:
        select:
          mode: dropdown
          options:
            - label: "🌡️ Seat Temperature"
              value: "seat"
            - label: "💧 Water Temperature"
              value: "water"
            - label: "💨 Wind Temperature"
              value: "wind"
    level:
      name: Level
      description: Temperature level from 0 (off) to 5 (maximum).
      example: "3"
      required: true
      selector:
        number:
          min: 0
          max: 5
          step: 1
          mode: slider

set_pressure:
  name: Set Water Pressure
  description: Set the water pressure level for washing functions.
  fields:
    level:
      name: Level
      description: Water pressure level from 0 (minimum) to 5 (maximum).
      example: "3"
      required: true
      selector:
        number:
          min: 0
          max: 5
          step: 1
          mode: slider

flush:
  name: Flush Toilet
  description: Trigger the toilet to flush.
  fields: {}

stop_all:
  name: Stop All Operations
  description: Immediately stop all ongoing toilet operations.
  fields: {}

set_light_color:
  name: Set Light Color
  description: Set the RGB color of the toilet light.
  fields:
    red:
      name: Red
      description: Red channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
    green:
      name: Green
      description: Green channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
    blue:
      name: Blue
      description: Blue channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
