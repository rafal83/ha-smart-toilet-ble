# Smart Toilet BLE Services

send_command:
  name: Send BLE Command
  description: Send a command to the smart toilet via BLE.
  fields:
    command:
      name: Command
      description: The command to execute on the toilet.
      example: "flush"
      required: true
      selector:
        select:
          mode: dropdown
          options:
            # Basic
            - label: "🔌 Power"
              value: "power"
            - label: "💡 Toilet Light"
              value: "light"
            - label: "🍃 Energy Saving"
              value: "eco"
            - label: "🫧 Foam Shield"
              value: "foam"
            - label: "🔄 Auto Mode"
              value: "auto_mode"
            - label: "🛑 Stop All"
              value: "stop"
            # Cleaning
            - label: "🧹 Self Clean"
              value: "self_clean"
            - label: "🌊 Flush"
              value: "flush"
            - label: "💨 Blow Dry"
              value: "blow_dry"
            # Wash
            - label: "🚿 Women's Wash"
              value: "women_wash"
            - label: "💧 Butt Wash"
              value: "butt_wash"
            - label: "👶 Child Wash"
              value: "child_wash"
            - label: "💆 Massage"
              value: "massage"
            # Cover
            - label: "🚽 Toilet Cover"
              value: "cover"
            - label: "⭕ Toilet Ring"
              value: "ring"
            # Toggles ON/OFF
            - label: "🔄 Auto Flush On"
              value: "auto_flush_on"
            - label: "🔄 Auto Flush Off"
              value: "auto_flush_off"
            - label: "🫧 Auto Foam On"
              value: "auto_foam_on"
            - label: "🫧 Auto Foam Off"
              value: "auto_foam_off"
            - label: "⚙️ Aging Mode On"
              value: "aging_mode_on"
            - label: "⚙️ Aging Mode Off"
              value: "aging_mode_off"
            - label: "💺 Virtual Seat On"
              value: "virtual_seat_on"
            - label: "💺 Virtual Seat Off"
              value: "virtual_seat_off"
            - label: "👤 User 1 On"
              value: "user_1_on"
            - label: "👤 User 1 Off"
              value: "user_1_off"
            - label: "👤 User 2 On"
              value: "user_2_on"
            - label: "👤 User 2 Off"
              value: "user_2_off"
            # Adjustments +/-
            - label: "🔊 Volume +"
              value: "volume_plus"
            - label: "🔉 Volume -"
              value: "volume_minus"
            - label: "📡 Radar Sensitivity +"
              value: "radar_plus"
            - label: "📡 Radar Sensitivity -"
              value: "radar_minus"
            - label: "⏱️ Flush Time +"
              value: "flush_time_plus"
            - label: "⏱️ Flush Time -"
              value: "flush_time_minus"
            - label: "⏲️ Auto Close Delay +"
              value: "auto_close_plus"
            - label: "⏲️ Auto Close Delay -"
              value: "auto_close_minus"
            - label: "🔼 Lid Open Force +"
              value: "lid_open_force_plus"
            - label: "🔽 Lid Open Force -"
              value: "lid_open_force_minus"
            - label: "🔼 Lid Close Force +"
              value: "lid_close_force_plus"
            - label: "🔽 Lid Close Force -"
              value: "lid_close_force_minus"
            - label: "🔼 Ring Open Force +"
              value: "ring_open_force_plus"
            - label: "🔽 Ring Open Force -"
              value: "ring_open_force_minus"
            - label: "🔼 Ring Close Force +"
              value: "ring_close_force_plus"
            - label: "🔽 Ring Close Force -"
              value: "ring_close_force_minus"

set_temperature:
  name: Set Temperature
  description: Set the temperature level for seat, water, or air dryer.
  fields:
    type:
      name: Type
      description: The temperature zone to control.
      example: "seat"
      required: true
      selector:
        select:
          mode: dropdown
          options:
            - label: "🌡️ Seat Temperature"
              value: "seat"
            - label: "💧 Water Temperature"
              value: "water"
            - label: "💨 Wind Temperature"
              value: "wind"
    level:
      name: Level
      description: Temperature level from 0 (off) to 5 (maximum).
      example: "3"
      required: true
      selector:
        number:
          min: 0
          max: 5
          step: 1
          mode: slider

set_pressure:
  name: Set Water Pressure
  description: Set the water pressure level for washing functions.
  fields:
    level:
      name: Level
      description: Water pressure level from 0 (minimum) to 5 (maximum).
      example: "3"
      required: true
      selector:
        number:
          min: 0
          max: 5
          step: 1
          mode: slider

flush:
  name: Flush Toilet
  description: Trigger the toilet to flush.
  fields: {}

stop_all:
  name: Stop All Operations
  description: Immediately stop all ongoing toilet operations.
  fields: {}

set_light_color:
  name: Set Ambient Light Color
  description: Set the RGB color of the ambient light.
  fields:
    red:
      name: Red
      description: Red channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
    green:
      name: Green
      description: Green channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
    blue:
      name: Blue
      description: Blue channel (0-255).
      example: "255"
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
