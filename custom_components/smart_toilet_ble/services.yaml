# Smart Toilet BLE Services

## Service: send_command

Send a custom BLE command to the toilet (advanced users).

```yaml
service: smart_toilet.send_command
data:
  entity_id: switch.toilet_power
  command: "flush"
```

Or with custom parameters:

```yaml
service: smart_toilet.send_command
data:
  entity_id: switch.toilet_power
  function: 64  # Seat temperature
  param1: 3     # Level 3
```
